  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ed;\n    line-height: 1.5;\n  }\n  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 40px; }\n\n  /* ---------- Masthead ---------- */\n  .masthead {\n    padding: 120px 0 96px;\n    border-bottom: 1px solid var(--line);\n    position: relative;\n    overflow: hidden;\n  }\n  .masthead::after {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: radial-gradient(140% 100% at 80% -10%, rgba(209, 78, 34, 0.13), transparent 55%),\n                radial-gradient(120% 90% at 10% 110%, rgba(47, 111, 117, 0.12), transparent 55%);\n    pointer-events: none;\n  }\n  .kicker {\n    font-family: \"Space Mono\", monospace;\n    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;\n    color: var(--muted); margin-bottom: 28px;\n  }\n  .masthead h1 {\n    font-family: \"Bricolage Grotesque\", sans-serif;\n    font-weight: 800;\n    font-size: clamp(44px, 7vw, 92px);\n    line-height: 0.96;\n    letter-spacing: -0.02em;\n    max-width: 16ch;\n    text-wrap: balance;\n  }\n  .masthead h1 em { font-style: normal; color: #d98b4a; }\n  .masthead .lede {\n    margin-top: 32px; max-width: 60ch;\n    font-size: 18px; color: #cbc1b2;\n  }\n  .masthead .lede .gd { color: #9aa9a3; font-style: italic; }\n  .conceptnav {\n    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 44px;\n    position: relative; z-index: 1;\n  }\n  .conceptnav a {\n    text-decoration: none; color: var(--paper);\n    border: 1px solid var(--line); border-radius: 999px;\n    padding: 11px 20px 11px 16px; font-size: 14px;\n    display: inline-flex; align-items: baseline; gap: 9px;\n    transition: background .2s, border-color .2s;\n  }\n  .conceptnav a:hover { background: rgba(237,228,214,0.06); border-color: rgba(237,228,214,0.3); }\n  .conceptnav a b { font-weight: 700; }\n  .conceptnav a span { color: var(--muted); font-size: 12.5px; }\n\n  /* ---------- Concept section shell ---------- */\n  .concept { padding: 96px 0; border-bottom: 1px solid var(--line); }\n  .concept-head { display: flex; gap: 48px; align-items: flex-start; flex-wrap: wrap; }\n  .concept-num {\n    font-family: \"Space Mono\", monospace; font-size: 13px;\n    letter-spacing: 0.2em; color: var(--c-accent);\n  }\n  .concept-title {\n    font-family: var(--c-display); font-weight: var(--c-display-wt, 400);\n    font-size: clamp(64px, 11vw, 150px); line-height: 0.9;\n    letter-spacing: var(--c-display-ls, -0.01em);\n    color: var(--c-fg);\n  }\n  .concept-meta { flex: 1; min-width: 280px; }\n  .pron {\n    font-family: \"Space Mono\", monospace; font-size: 13px;\n    color: var(--muted); margin: 18px 0 4px; letter-spacing: 0.04em;\n  }\n  .meaning { font-size: 15px; color: #b6ab9d; }\n  .meaning b { color: var(--c-accent); font-weight: 600; }\n  .rationale {\n    flex: 1; min-width: 280px; max-width: 46ch; margin-top: 8px;\n    font-size: 16px; color: #c4baac; line-height: 1.62;\n  }\n  .rationale .lbl {\n    display: block; font-family: \"Space Mono\", monospace; font-size: 11px;\n    letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted);\n    margin-bottom: 12px;\n  }\n\n  .grid { display: grid; gap: 28px; margin-top: 56px; }\n  .panel {\n    background: var(--c-panel); border: 1px solid var(--c-line);\n    border-radius: 4px; padding: 30px;\n  }\n  .panel-lbl {\n    font-family: \"Space Mono\", monospace; font-size: 11px; letter-spacing: 0.22em;\n    text-transform: uppercase; color: var(--muted); margin-bottom: 22px;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .panel-lbl::after { content:\"\"; flex:1; height:1px; background: var(--c-line); }\n\n  /* logo block */\n  .logo-stage {\n    background: var(--c-stage); border-radius: 3px; min-height: 200px;\n    display: flex; align-items: center; justify-content: center; gap: 22px;\n    padding: 40px; flex-wrap: wrap;\n  }\n  .wordmark { display: flex; align-items: center; gap: 18px; }\n  .wordmark .mk { width: var(--mk-w, 52px); height: auto; flex: none; }\n  .wordmark .wm {\n    font-family: var(--c-display); font-weight: var(--c-display-wt, 400);\n    font-size: var(--wm-size, 58px); letter-spacing: var(--c-display-ls, 0);\n    color: var(--c-fg); line-height: 1;\n  }\n  .logo-variants { display: flex; gap: 14px; margin-top: 18px; flex-wrap: wrap; }\n  .logo-chip {\n    flex: 1; min-width: 150px; border-radius: 3px; padding: 22px;\n    display: flex; align-items: center; justify-content: center;\n    border: 1px solid var(--c-line);\n  }\n  .logo-chip .mk { width: 30px; }\n  .logo-chip .lockup { display:flex; align-items:center; gap:11px; }\n  .logo-chip .lockup .nm {\n    font-family: var(--c-display); font-weight: var(--c-display-wt,400);\n    font-size: 26px; letter-spacing: var(--c-display-ls,0);\n  }\n\n  /* palette */\n  .swatches { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 0; border-radius: 3px; overflow: hidden; }\n  .sw { padding: 20px 18px; min-height: 132px; display: flex; flex-direction: column; justify-content: flex-end; }\n  .sw .nm { font-size: 14px; font-weight: 600; }\n  .sw .hx { font-family: \"Space Mono\", monospace; font-size: 12px; opacity: 0.82; margin-top: 3px; }\n\n  /* type */\n  .type-row { padding: 22px 0; border-top: 1px solid var(--c-line); }\n  .type-row:first-of-type { border-top: 0; padding-top: 0; }\n  .type-tag { font-family: \"Space Mono\", monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }\n  .type-display { font-family: var(--c-display); font-weight: var(--c-display-wt,400); font-size: clamp(40px,6vw,72px); line-height: 0.98; letter-spacing: var(--c-display-ls,0); color: var(--c-fg); }\n  .type-body-spec { font-size: 19px; line-height: 1.55; color: #c9bfb1; max-width: 54ch; }\n  .type-scale { font-family: var(--c-display); color: var(--c-fg); display:flex; flex-wrap:wrap; align-items:baseline; gap:18px; }\n  .type-note { margin-top: 18px; font-size: 14.5px; color: #a89e90; line-height: 1.6; max-width: 60ch; }\n  .type-note b { color: var(--c-accent); font-weight: 600; }\n\n  /* voice */\n  .voice-en { font-family: var(--c-display); font-weight: var(--c-display-wt,400); font-size: clamp(32px,4.6vw,54px); line-height: 1.05; letter-spacing: var(--c-display-ls,0); color: var(--c-fg); text-wrap: balance; }\n  .voice-gd { margin-top: 18px; font-size: 22px; color: var(--c-accent); font-style: italic; }\n  .voice-gd .tr { display:block; margin-top: 8px; font-style: normal; font-size: 13px; color: var(--muted); font-family: \"Space Mono\", monospace; letter-spacing: 0.04em; }\n\n  /* two-up layout helper */\n  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }\n  @media (max-width: 880px){ .two { grid-template-columns: 1fr; } }\n\n  /* application card */\n  .app-stage { background: var(--c-stage); border-radius: 3px; padding: 48px; display:flex; justify-content:center; }\n\n  footer { padding: 80px 0 110px; color: var(--muted); font-size: 14px; }\n  footer b { color: var(--paper); font-weight: 600; }\n  .flag { margin-top: 18px; padding: 18px 22px; border:1px solid var(--line); border-radius: 4px; max-width: 70ch; color:#bdb3a5; font-size: 14px; line-height: 1.6; }\n  .flag b { color: #e0a968; }\n\n  /* ============ CONCEPT THEMES ============ */\n  /* 1 · TEINE : fire / ember / iron */\n  .teine {\n    --c-display: \"Bricolage Grotesque\", sans-serif; --c-display-wt: 800; --c-display-ls: -0.02em;\n    --c-accent: #d98b4a; --c-fg: #f2e7d6;\n    --c-panel: #1d1916; --c-line: rgba(237,228,214,0.12); --c-stage: #120e0c;\n    --mk-w: 50px; --wm-size: 60px;\n  }\n  /* 2 · CUAN : sea / atlantic / cold */\n  .cuan {\n    --c-display: \"Libre Caslon Display\", serif; --c-display-wt: 400; --c-display-ls: 0.005em;\n    --c-accent: #5fb0b0; --c-fg: #eaf2ef;\n    --c-panel: #15282d; --c-line: rgba(174,196,195,0.16); --c-stage: #0e2127;\n    --mk-w: 56px; --wm-size: 64px;\n    background: linear-gradient(180deg, #102a30, #0d2025);\n  }\n  .cuan .concept-title, .cuan .type-display, .cuan .voice-en, .cuan .wordmark .wm { font-weight: 400; }\n  /* 3 · BLÀTHS : warmth / blossom / heather */\n  .blaths {\n    --c-display: \"Instrument Serif\", serif; --c-display-wt: 400; --c-display-ls: 0;\n    --c-accent: #e2a95f; --c-fg: #efe8da;\n    --c-panel: #241c19; --c-line: rgba(239,232,218,0.12); --c-stage: #1b1411;\n    --mk-w: 40px; --wm-size: 70px;\n    background: linear-gradient(180deg, #1f1814, #14100d);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n\n<!-- ===================== MASTHEAD ===================== -->\n<header class=\"masthead\">\n  <div class=\"wrap\">\n    <div class=\"kicker\">Brand Exploration · Isle of Skye · An t-Eilean Sgitheanach<\u002Fdiv>\n    <h1>A community sauna on the wild edge. Three names, three worlds: <em>fire, sea and warmth<\u002Fem>.<\u002Fh1>\n    <p class=\"lede\">Wood-fired heat on a January harbourside, a cold plunge in the Atlantic and Gaelic at the centre of it, not as decoration. Below are three complete directions. Each stands on its own, with its own logo, palette, type, voice and a working sample. <span class=\"gd\">Tagh aon.<\u002Fspan> Choose one and I'll build the full system around it.<\u002Fp>\n    <nav class=\"conceptnav\">\n      <a href=\"#teine\"><b>01 · Teine<\u002Fb><span>fire<\u002Fspan><\u002Fa>\n      <a href=\"#cuan\"><b>02 · Cuan<\u002Fb><span>sea<\u002Fspan><\u002Fa>\n      <a href=\"#blaths\"><b>03 · Blàths<\u002Fb><span>warmth<\u002Fspan><\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===================== 01 · TEINE ===================== -->\n<section class=\"concept teine\" id=\"teine\">\n  <div class=\"wrap\">\n    <div class=\"concept-head\">\n      <div>\n        <div class=\"concept-num\">CONCEPT 01<\u002Fdiv>\n        <div class=\"concept-title\">Teine<\u002Fdiv>\n        <div class=\"pron\">/ˈtʃɛn.ə/ · \"CHEH-nyuh\"<\u002Fdiv>\n        <div class=\"meaning\">Scottish Gaelic for <b>fire<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rationale\">\n        <span class=\"lbl\">Rationale<\u002Fspan>\n        Teine is the hearth direction, all iron and ember. The mark is a single wind-leaned flame cut with the notch of a Cuillin peak, so heat and landscape read as one shape. A near-black peat ground lets the ember do all the talking and the raw grotesque wordmark feels worked, like something hammered rather than styled. It belongs on a slate sign, lit from below.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid\">\n      <!-- LOGO -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">A · Logo<\u002Fdiv>\n        <div class=\"logo-stage\">\n          <div class=\"wordmark\">\n            <svg class=\"mk\" viewBox=\"0 0 50 64\" fill=\"none\" aria-label=\"Teine flame mark\">\n              <path d=\"M25 2C27 16 40 21 35 39c-2 8-10 13-10 13\" stroke=\"#d14e22\" stroke-width=\"0\"><\u002Fpath>\n              <path d=\"M25 3c1.5 12 13 16.5 11.5 31.5C35.6 47 26 60 25 61c-1-1-10.6-14-11.5-26.5C12 19.5 22 16 23 6c.6 7 5.4 9 6 16 .4-7-4.6-12-4-19Z\" fill=\"#d14e22\"><\u002Fpath>\n              <path d=\"M25 24c.8 6 6.5 8 5.5 16-.6 5-5.5 9.5-5.5 9.5s-4.9-4.5-5.5-9.5c-1-8 4.7-10 5.5-16Z\" fill=\"#e89a3c\"><\u002Fpath>\n            <\u002Fsvg>\n            <div class=\"wm\">Teine<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-variants\">\n          <div class=\"logo-chip\" style=\"background:#d14e22;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 50 64\"><path d=\"M25 3c1.5 12 13 16.5 11.5 31.5C35.6 47 26 60 25 61c-1-1-10.6-14-11.5-26.5C12 19.5 22 16 23 6c.6 7 5.4 9 6 16 .4-7-4.6-12-4-19Z\" fill=\"#120e0c\"><\u002Fpath><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#120e0c;\">Teine<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"logo-chip\" style=\"background:#f2e7d6;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 50 64\"><path d=\"M25 3c1.5 12 13 16.5 11.5 31.5C35.6 47 26 60 25 61c-1-1-10.6-14-11.5-26.5C12 19.5 22 16 23 6c.6 7 5.4 9 6 16 .4-7-4.6-12-4-19Z\" fill=\"#1d1916\"><\u002Fpath><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#1d1916;\">Teine<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"logo-chip\" style=\"background:#120e0c;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 50 64\"><path d=\"M25 3c1.5 12 13 16.5 11.5 31.5C35.6 47 26 60 25 61c-1-1-10.6-14-11.5-26.5C12 19.5 22 16 23 6c.6 7 5.4 9 6 16 .4-7-4.6-12-4-19Z\" fill=\"#d14e22\"><\u002Fpath><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#f2e7d6;\">Teine<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PALETTE -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">B · Palette<\u002Fdiv>\n        <div class=\"swatches\">\n          <div class=\"sw\" style=\"background:#120e0c;color:#f2e7d6;\"><div class=\"nm\">Peat Black<\u002Fdiv><div class=\"hx\">#120E0C<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#3a3631;color:#f2e7d6;\"><div class=\"nm\">Cuillin Slate<\u002Fdiv><div class=\"hx\">#3A3631<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#d14e22;color:#120e0c;\"><div class=\"nm\">Ember<\u002Fdiv><div class=\"hx\">#D14E22<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#e89a3c;color:#120e0c;\"><div class=\"nm\">Hearth Gold<\u002Fdiv><div class=\"hx\">#E89A3C<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#938a80;color:#120e0c;\"><div class=\"nm\">Ash Grey<\u002Fdiv><div class=\"hx\">#938A80<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#ece3d4;color:#120e0c;\"><div class=\"nm\">Oatmeal<\u002Fdiv><div class=\"hx\">#ECE3D4<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- TYPE + VOICE -->\n      <div class=\"two\">\n        <div class=\"panel\">\n          <div class=\"panel-lbl\">C · Type<\u002Fdiv>\n          <div class=\"type-row\">\n            <div class=\"type-tag\">Display · Bricolage Grotesque 800<\u002Fdiv>\n            <div class=\"type-display\">Tend the fire<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-row\">\n            <div class=\"type-tag\">Body · Hanken Grotesk<\u002Fdiv>\n            <div class=\"type-body-spec\">Wood-fired heat on the harbour wall, then straight into the Atlantic. Sessions run from first light through to dark, all winter.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-note\">A raw, slightly irregular grotesque against a clean humanist sans. <b>Bricolage<\u002Fb> carries weight and grit for signage; <b>Hanken<\u002Fb> stays quiet and legible at booking-text sizes. Both free on Google Fonts.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <div class=\"panel-lbl\">D · Voice<\u002Fdiv>\n          <div class=\"voice-en\">An ancient heat, kept for everyone.<\u002Fdiv>\n          <div class=\"voice-gd\">Cùm an teine beò.\n            <span class=\"tr\">\"Keep the fire alive.\" An idiom for keeping the community and its traditions going.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"type-note\" style=\"margin-top:34px;\">The voice is plain and warm, like a harbourmaster who's glad you came. Sentences stay short. Nobody says \"wellness\". Heat and cold get equal billing.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- APPLICATION -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">E · Sample · Session Ticket<\u002Fdiv>\n        <div class=\"app-stage\">\n          <div style=\"width:340px;background:#171311;border:1px solid rgba(237,228,214,0.12);border-radius:6px;overflow:hidden;font-family:'Hanken Grotesk',sans-serif;\">\n            <div style=\"background:#d14e22;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;\">\n              <div style=\"display:flex;align-items:center;gap:11px;\">\n                <svg style=\"width:26px;\" viewBox=\"0 0 50 64\"><path d=\"M25 3c1.5 12 13 16.5 11.5 31.5C35.6 47 26 60 25 61c-1-1-10.6-14-11.5-26.5C12 19.5 22 16 23 6c.6 7 5.4 9 6 16 .4-7-4.6-12-4-19Z\" fill=\"#120e0c\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:26px;color:#120e0c;\">Teine<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#120e0c;letter-spacing:0.1em;\">No. 0417<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:24px;\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.2em;color:#938a80;text-transform:uppercase;\">Harbour Sauna · Portree<\u002Fdiv>\n              <div style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:34px;color:#f2e7d6;line-height:1.05;margin:10px 0 4px;\">Sun 14 Dec<\u002Fdiv>\n              <div style=\"font-size:15px;color:#e89a3c;\">07:30 – 08:30 · Dawn session<\u002Fdiv>\n              <div style=\"height:1px;background:rgba(237,228,214,0.12);margin:22px 0;\"><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:14px;color:#c4baac;\">\n                <div><div style=\"color:#938a80;font-size:12px;\">Party<\u002Fdiv>2 adults<\u002Fdiv>\n                <div style=\"text-align:right;\"><div style=\"color:#938a80;font-size:12px;\">Plunge<\u002Fdiv>Atlantic, 8°C<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:22px;padding:14px;background:#120e0c;border-radius:4px;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:#938a80;letter-spacing:0.18em;\">▮▮ ▮ ▮▮▮ ▮ ▮▮ ▮ ▮▮▮▮<\u002Fdiv>\n              <div style=\"margin-top:16px;text-align:center;font-size:13px;color:#938a80;font-style:italic;\">Cùm an teine beò.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 02 · CUAN ===================== -->\n<section class=\"concept cuan\" id=\"cuan\">\n  <div class=\"wrap\">\n    <div class=\"concept-head\">\n      <div>\n        <div class=\"concept-num\">CONCEPT 02<\u002Fdiv>\n        <div class=\"concept-title\">Cuan<\u002Fdiv>\n        <div class=\"pron\">/ˈkuən/ · \"KOO-an\"<\u002Fdiv>\n        <div class=\"meaning\">Scottish Gaelic for <b>ocean / sea<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rationale\">\n        <span class=\"lbl\">Rationale<\u002Fspan>\n        Cuan is the cold-water direction, with the plunge given top billing. The mark is a porthole holding two swells, the moment before you go under. A deep Atlantic ground and a high-contrast Caslon display make it the most editorial and maritime of the three, closer to a shipping line or a sea-swimming club than a sauna. One warm buoy-rust accent is the only heat in the frame, and it does a lot of work.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid\">\n      <!-- LOGO -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">A · Logo<\u002Fdiv>\n        <div class=\"logo-stage\">\n          <div class=\"wordmark\">\n            <svg class=\"mk\" viewBox=\"0 0 64 64\" fill=\"none\" aria-label=\"Cuan porthole mark\">\n              <circle cx=\"32\" cy=\"32\" r=\"29\" stroke=\"#5fb0b0\" stroke-width=\"2.5\"><\u002Fcircle>\n              <circle cx=\"32\" cy=\"32\" r=\"23.5\" stroke=\"#5fb0b0\" stroke-width=\"1\" stroke-opacity=\"0.4\"><\u002Fcircle>\n              <path d=\"M11 36c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#5fb0b0\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M11 45c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#c46a3a\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n            <div class=\"wm\">Cuan<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-variants\">\n          <div class=\"logo-chip\" style=\"background:#5fb0b0;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 64 64\" fill=\"none\"><circle cx=\"32\" cy=\"32\" r=\"29\" stroke=\"#0e2127\" stroke-width=\"3\"><\u002Fcircle><path d=\"M11 38c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#0e2127\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#0e2127;\">Cuan<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"logo-chip\" style=\"background:#eaf2ef;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 64 64\" fill=\"none\"><circle cx=\"32\" cy=\"32\" r=\"29\" stroke=\"#15282d\" stroke-width=\"3\"><\u002Fcircle><path d=\"M11 38c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#15282d\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#15282d;\">Cuan<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"logo-chip\" style=\"background:#0e2127;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 64 64\" fill=\"none\"><circle cx=\"32\" cy=\"32\" r=\"29\" stroke=\"#5fb0b0\" stroke-width=\"3\"><\u002Fcircle><path d=\"M11 38c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#c46a3a\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#eaf2ef;\">Cuan<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PALETTE -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">B · Palette<\u002Fdiv>\n        <div class=\"swatches\">\n          <div class=\"sw\" style=\"background:#0e2127;color:#eaf2ef;\"><div class=\"nm\">Kelp Dark<\u002Fdiv><div class=\"hx\">#0E2127<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#15323b;color:#eaf2ef;\"><div class=\"nm\">Deep Atlantic<\u002Fdiv><div class=\"hx\">#15323B<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#2f6f75;color:#eaf2ef;\"><div class=\"nm\">Tide<\u002Fdiv><div class=\"hx\">#2F6F75<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#aec4c3;color:#0e2127;\"><div class=\"nm\">Sea Mist<\u002Fdiv><div class=\"hx\">#AEC4C3<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#c46a3a;color:#0e2127;\"><div class=\"nm\">Buoy Rust<\u002Fdiv><div class=\"hx\">#C46A3A<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#eef3f1;color:#0e2127;\"><div class=\"nm\">Foam<\u002Fdiv><div class=\"hx\">#EEF3F1<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"two\">\n        <div class=\"panel\">\n          <div class=\"panel-lbl\">C · Type<\u002Fdiv>\n          <div class=\"type-row\">\n            <div class=\"type-tag\">Display · Libre Caslon Display<\u002Fdiv>\n            <div class=\"type-display\">Into the blue<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-row\">\n            <div class=\"type-tag\">Body · IBM Plex Sans<\u002Fdiv>\n            <div class=\"type-body-spec\">Two minutes in the sea, ten in the heat and again. The water off Skye rarely climbs past nine degrees, which is rather the point.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-note\">High-contrast <b>Caslon<\u002Fb> gives an editorial, slightly nautical authority, the feel of old chart engraving. <b>IBM Plex Sans<\u002Fb> is the modern, technical counterweight for tide tables and times. Both free on Google Fonts.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <div class=\"panel-lbl\">D · Voice<\u002Fdiv>\n          <div class=\"voice-en\">Come for the cold. Stay for the heat.<\u002Fdiv>\n          <div class=\"voice-gd\">Thig don chuan.\n            <span class=\"tr\">\"Come to the sea.\" An open invitation rather than a command.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"type-note\" style=\"margin-top:34px;\">The voice is spare and a little salty, measured and weatherwise and quietly proud of the cold. Numbers and degrees are welcome. It stays calm and never reaches for hype.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- APPLICATION -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">E · Sample · Booking Card<\u002Fdiv>\n        <div class=\"app-stage\">\n          <div style=\"width:360px;background:#eef3f1;border-radius:8px;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;color:#15282d;box-shadow:0 18px 50px rgba(0,0,0,0.45);\">\n            <div style=\"padding:22px 24px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(21,40,45,0.12);\">\n              <div style=\"display:flex;align-items:center;gap:10px;\">\n                <svg style=\"width:30px;\" viewBox=\"0 0 64 64\" fill=\"none\"><circle cx=\"32\" cy=\"32\" r=\"29\" stroke=\"#15282d\" stroke-width=\"3\"><\u002Fcircle><path d=\"M11 36c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#15282d\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M11 45c4.5-5 9-5 13.5 0s9 5 13.5 0 9-5 13.5 0\" stroke=\"#c46a3a\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-family:'Libre Caslon Display';font-size:26px;\">Cuan<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-family:'IBM Plex Sans';font-weight:600;font-size:11px;letter-spacing:0.12em;color:#2f6f75;text-transform:uppercase;\">Elgol Beach<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:22px 24px;\">\n              <div style=\"font-family:'Libre Caslon Display';font-size:30px;line-height:1.1;\">Saturday Plunge<br>&amp; Sauna<\u002Fdiv>\n              <div style=\"display:flex;gap:24px;margin-top:18px;\">\n                <div><div style=\"font-size:11px;color:#2f6f75;text-transform:uppercase;letter-spacing:0.1em;\">Date<\u002Fdiv><div style=\"font-weight:600;font-size:16px;\">20 Dec<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:11px;color:#2f6f75;text-transform:uppercase;letter-spacing:0.1em;\">Time<\u002Fdiv><div style=\"font-weight:600;font-size:16px;\">09:00<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:11px;color:#2f6f75;text-transform:uppercase;letter-spacing:0.1em;\">Sea<\u002Fdiv><div style=\"font-weight:600;font-size:16px;color:#c46a3a;\">7.5°C<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <button style=\"width:100%;margin-top:22px;background:#15282d;color:#eef3f1;border:0;border-radius:5px;padding:14px;font-family:'IBM Plex Sans';font-weight:600;font-size:15px;cursor:pointer;\">Reserve a spot — £18<\u002Fbutton>\n              <div style=\"margin-top:14px;text-align:center;font-size:13px;color:#2f6f75;font-style:italic;font-family:'Libre Caslon Display';\">Thig don chuan.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 03 · BLÀTHS ===================== -->\n<section class=\"concept blaths\" id=\"blaths\">\n  <div class=\"wrap\">\n    <div class=\"concept-head\">\n      <div>\n        <div class=\"concept-num\">CONCEPT 03<\u002Fdiv>\n        <div class=\"concept-title\">Blàths<\u002Fdiv>\n        <div class=\"pron\">/blaːs/ · \"blaas\"<\u002Fdiv>\n        <div class=\"meaning\">Scottish Gaelic for <b>warmth / blossom<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rationale\">\n        <span class=\"lbl\">Rationale<\u002Fspan>\n        Blàths is the human, hospitable direction, warmth as a feeling rather than a temperature. The mark is a sprig of bog cotton (canach an t-slèibh), the white tuft that blossoms across Highland moors in summer. It is soft, local and a world away from spa lotus motifs. The delicate high-contrast Instrument Serif gives it an unhurried, almost handwritten editorial grace, warmed by amber and dusty heather. It feels like being welcomed in from the weather.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid\">\n      <!-- LOGO -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">A · Logo<\u002Fdiv>\n        <div class=\"logo-stage\">\n          <div class=\"wordmark\">\n            <svg class=\"mk\" viewBox=\"0 0 44 64\" fill=\"none\" aria-label=\"Blàths bog-cotton mark\">\n              <path d=\"M22 60V26\" stroke=\"#a89e90\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n              <path d=\"M22 40c-5-1-9-4-10-8M22 48c4-1 8-3 9-7\" stroke=\"#a89e90\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath>\n              <g stroke=\"#efe8da\" stroke-width=\"2.4\" stroke-linecap=\"round\">\n                <path d=\"M22 26V10\"><\u002Fpath><path d=\"M22 18 13 9\"><\u002Fpath><path d=\"M22 18l9-9\"><\u002Fpath><path d=\"M22 20 11 16\"><\u002Fpath><path d=\"M22 20l11-4\"><\u002Fpath>\n              <\u002Fg>\n              <circle cx=\"22\" cy=\"9\" r=\"3.4\" fill=\"#e2a95f\"><\u002Fcircle>\n            <\u002Fsvg>\n            <div class=\"wm\">Blàths<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"logo-variants\">\n          <div class=\"logo-chip\" style=\"background:#e2a95f;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 44 64\" fill=\"none\"><path d=\"M22 60V26\" stroke=\"#1b1411\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><g stroke=\"#1b1411\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M22 26V10\"><\u002Fpath><path d=\"M22 18 13 9\"><\u002Fpath><path d=\"M22 18l9-9\"><\u002Fpath><\u002Fg><circle cx=\"22\" cy=\"9\" r=\"3.4\" fill=\"#1b1411\"><\u002Fcircle><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#1b1411;\">Blàths<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"logo-chip\" style=\"background:#efe8da;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 44 64\" fill=\"none\"><path d=\"M22 60V26\" stroke=\"#835e78\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><g stroke=\"#835e78\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M22 26V10\"><\u002Fpath><path d=\"M22 18 13 9\"><\u002Fpath><path d=\"M22 18l9-9\"><\u002Fpath><\u002Fg><circle cx=\"22\" cy=\"9\" r=\"3.4\" fill=\"#e2a95f\"><\u002Fcircle><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#241c19;\">Blàths<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"logo-chip\" style=\"background:#1b1411;\">\n            <div class=\"lockup\">\n              <svg class=\"mk\" viewBox=\"0 0 44 64\" fill=\"none\"><path d=\"M22 60V26\" stroke=\"#a89e90\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><g stroke=\"#efe8da\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M22 26V10\"><\u002Fpath><path d=\"M22 18 13 9\"><\u002Fpath><path d=\"M22 18l9-9\"><\u002Fpath><\u002Fg><circle cx=\"22\" cy=\"9\" r=\"3.4\" fill=\"#e2a95f\"><\u002Fcircle><\u002Fsvg>\n              <span class=\"nm\" style=\"color:#efe8da;\">Blàths<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PALETTE -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">B · Palette<\u002Fdiv>\n        <div class=\"swatches\">\n          <div class=\"sw\" style=\"background:#1b1411;color:#efe8da;\"><div class=\"nm\">Peat Brown<\u002Fdiv><div class=\"hx\">#1B1411<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#835e78;color:#efe8da;\"><div class=\"nm\">Dusty Heather<\u002Fdiv><div class=\"hx\">#835E78<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#b06a34;color:#1b1411;\"><div class=\"nm\">Bracken Rust<\u002Fdiv><div class=\"hx\">#B06A34<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#e2a95f;color:#1b1411;\"><div class=\"nm\">Amber Glow<\u002Fdiv><div class=\"hx\">#E2A95F<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#bcb2a4;color:#1b1411;\"><div class=\"nm\">Moor Stone<\u002Fdiv><div class=\"hx\">#BCB2A4<\u002Fdiv><\u002Fdiv>\n          <div class=\"sw\" style=\"background:#efe8da;color:#1b1411;\"><div class=\"nm\">Bog Cotton<\u002Fdiv><div class=\"hx\">#EFE8DA<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"two\">\n        <div class=\"panel\">\n          <div class=\"panel-lbl\">C · Type<\u002Fdiv>\n          <div class=\"type-row\">\n            <div class=\"type-tag\">Display · Instrument Serif<\u002Fdiv>\n            <div class=\"type-display\" style=\"font-size:clamp(48px,7vw,86px);\">Warm welcome<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-row\">\n            <div class=\"type-tag\">Body · Work Sans<\u002Fdiv>\n            <div class=\"type-body-spec\">Come up the path, leave your boots at the door and sit in the heat while the rain does what it does. There's tea after.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"type-note\"><b>Instrument Serif<\u002Fb> is delicate and high-contrast, editorial without being stiff and almost spoken aloud. <b>Work Sans<\u002Fb> grounds it with friendly, even body text. Both free on Google Fonts.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"panel\">\n          <div class=\"panel-lbl\">D · Voice<\u002Fdiv>\n          <div class=\"voice-en\">Warmth, the way the island gives it.<\u002Fdiv>\n          <div class=\"voice-gd\">Blàths à fuachd.\n            <span class=\"tr\">\"Warmth out of cold.\" The heat the plunge gives back.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"type-note\" style=\"margin-top:34px;\">The voice is gentle and generous and speaks as \"we\". \"Come in\", \"sit with us\", \"there's tea after\". Hospitable without being soft. It welcomes the weather rather than hiding from it.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- APPLICATION -->\n      <div class=\"panel\">\n        <div class=\"panel-lbl\">E · Sample · Booking Card<\u002Fdiv>\n        <div class=\"app-stage\">\n          <div style=\"width:350px;background:#241c19;border:1px solid rgba(239,232,218,0.14);border-radius:10px;overflow:hidden;font-family:'Work Sans',sans-serif;color:#efe8da;\">\n            <div style=\"padding:26px 26px 0;display:flex;align-items:center;gap:11px;\">\n              <svg style=\"width:24px;\" viewBox=\"0 0 44 64\" fill=\"none\"><path d=\"M22 60V26\" stroke=\"#a89e90\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><g stroke=\"#efe8da\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M22 26V10\"><\u002Fpath><path d=\"M22 18 13 9\"><\u002Fpath><path d=\"M22 18l9-9\"><\u002Fpath><\u002Fg><circle cx=\"22\" cy=\"9\" r=\"3.4\" fill=\"#e2a95f\"><\u002Fcircle><\u002Fsvg>\n              <span style=\"font-family:'Instrument Serif';font-size:30px;\">Blàths<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:18px 26px 26px;\">\n              <div style=\"font-family:'Instrument Serif';font-size:34px;line-height:1.08;color:#efe8da;\">An evening sauna<br><span style=\"font-style:italic;color:#e2a95f;\">by the water<\u002Fspan><\u002Fdiv>\n              <div style=\"margin-top:20px;display:flex;flex-direction:column;gap:11px;font-size:14.5px;color:#bcb2a4;\">\n                <div style=\"display:flex;justify-content:space-between;border-bottom:1px solid rgba(239,232,218,0.1);padding-bottom:9px;\"><span>When<\u002Fspan><span style=\"color:#efe8da;\">Fri 19 Dec · 17:00<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;border-bottom:1px solid rgba(239,232,218,0.1);padding-bottom:9px;\"><span>Where<\u002Fspan><span style=\"color:#efe8da;\">Camas Bàn, Portree<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between;\"><span>For<\u002Fspan><span style=\"color:#efe8da;\">You + 1 · tea after<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <button style=\"width:100%;margin-top:22px;background:#e2a95f;color:#1b1411;border:0;border-radius:999px;padding:14px;font-family:'Work Sans';font-weight:600;font-size:15px;cursor:pointer;\">Hold my place<\u002Fbutton>\n              <div style=\"margin-top:14px;text-align:center;font-family:'Instrument Serif';font-style:italic;font-size:17px;color:#835e78;\">Blàths à fuachd.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FOOTER ===================== -->\n<footer>\n  <div class=\"wrap\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;\">Next step<\u002Fdiv>\n    <div style=\"font-size:20px;color:var(--paper);max-width:60ch;line-height:1.5;\">Tell me which direction sings (<b>Teine<\u002Fb>, <b>Cuan<\u002Fb> or <b>Blàths<\u002Fb>) and I'll build the complete design system around it: tokens, fonts, components, UI kit and a brand guide.<\u002Fdiv>\n    <div class=\"flag\">\n      <b>⚑ Gaelic accuracy:<\u002Fb> the Gaelic lines are drafted to be idiomatic rather than literal, but I'm not a native speaker and these are intended for real signage. Please have a fluent Gàidhlig speaker check the chosen line before anything is cut or printed.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
